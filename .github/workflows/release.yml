name: Release desktop

# Builds the Labee desktop app on native runners — macOS (Apple Silicon / arm64)
# and Windows (x64) — and publishes both installers to a GitHub Release. NSIS
# needs Windows/Wine and the mac .dmg needs macOS, so neither can be produced on
# the other platform; each job builds its own.
#
# Trigger by pushing a v* tag (e.g. `git tag v0.1.1 && git push origin v0.1.1`),
# or manually via workflow_dispatch with a tag input.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build & publish (e.g. v0.1.1)"
        required: true

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS (arm64)
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pin bun — a newer bun/tsdown turns the server bundle's "unintended
          # bundling" advisory into a fatal error.
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build workspaces (web + server + desktop)
        run: bun run turbo run build --filter=@labee/web --filter=@labee/server --filter=@labee/desktop
      - name: Build macOS installer (dmg, arm64)
        run: bunx electron-builder --mac dmg --arm64 --publish never
        working-directory: apps/desktop
      - uses: actions/upload-artifact@v4
        with:
          name: labee-macos-arm64
          path: apps/desktop/release/*.dmg

  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build workspaces (web + server + desktop)
        run: bun run turbo run build --filter=@labee/web --filter=@labee/server --filter=@labee/desktop
      - name: Build Windows installer (NSIS, x64)
        run: bunx electron-builder --win nsis --x64 --publish never
        working-directory: apps/desktop
      - uses: actions/upload-artifact@v4
        with:
          name: labee-windows-x64
          path: apps/desktop/release/*.exe

  release:
    name: Publish GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_REF_NAME}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Create or update the release with both installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          FILES=$(find dist -type f \( -name '*.dmg' -o -name '*.exe' \))
          echo "Release $TAG assets:"; echo "$FILES"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" $FILES --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" $FILES \
              --repo "$GITHUB_REPOSITORY" \
              --title "Labee ${TAG#v}" \
              --generate-notes
          fi
