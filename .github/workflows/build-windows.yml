name: Build Windows desktop

# Builds the Labee Windows installer on a real Windows runner (NSIS needs
# Windows/Wine, which we don't have on the dev Mac) and attaches the .exe to the
# given GitHub release. Trigger manually (workflow_dispatch) with a release tag,
# or automatically when a v* tag is pushed.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the installer to"
        default: "v0.1.0"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspaces (mcp + web + server + desktop)
        run: bun run turbo run build --filter=@labee/mcp-protocols --filter=@labee/web --filter=@labee/server --filter=@labee/desktop

      - name: Build Windows installer (NSIS, x64)
        run: bunx electron-builder --win nsis --x64 --publish never
        working-directory: apps/desktop

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: labee-windows-installer
          path: apps/desktop/release/*.exe

      - name: Attach installer to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_REF_NAME}"; fi
          echo "Uploading Windows installer to release $TAG"
          gh release upload "$TAG" apps/desktop/release/*.exe --clobber
